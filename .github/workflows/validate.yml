name: Validate courses

on:
  push:
    paths:
      - "public/courses/**"
      - "public/radio/**"
      - "public/messages.json"
      - "public/assets/css/**"
      - "schema/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "public/courses/**"
      - "public/radio/**"
      - "public/messages.json"
      - "public/assets/css/**"
      - "schema/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run validate
      - run: npm run validate:radio
      - run: npm run validate:messages
      - run: npm run validate:css
