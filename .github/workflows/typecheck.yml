name: Typecheck

# `tsc --noEmit` over both projects: the app (tsconfig.json -> src + vite.config.ts)
# and the Pages Functions (functions/tsconfig.json), which target different
# runtimes and so cannot share one config.
#
# Separate from validate.yml on purpose: that workflow's paths filter deliberately
# ignores src/**, so a step added there would not run on a src-only change, which
# is exactly the change a typecheck exists to catch.

on:
  push:
    paths:
      - "src/**"
      - "functions/**"
      - "vite.config.ts"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/typecheck.yml"
  pull_request:
    paths:
      - "src/**"
      - "functions/**"
      - "vite.config.ts"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/typecheck.yml"

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
